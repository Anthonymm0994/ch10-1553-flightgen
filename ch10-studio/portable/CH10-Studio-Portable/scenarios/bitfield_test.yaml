# Simple test scenario for bitfield functionality
scenario:
  name: "Bitfield Test"
  duration_s: 10.0
  seed: 42

flight_profile:
  segments:
    - type: "level"
      duration_s: 10.0
      altitude_ft: 10000
      airspeed_kts: 250
      heading_deg: 180

# Add some derived values for bitfield testing
derived:
  system_ok: 1
  warning: 0
  error: 0
  temperature: 75
  pressure: 630
  engine_rpm: 2500
  oil_temperature: 30
  oil_pressure_high: 1
  gps_valid: 1
  ins_valid: 1
  magnetic_variation: 5.0
  wind_direction: 45
  accel_x_g: 0.1
  accel_y_g: -0.05
  accel_z_g: 1.0
